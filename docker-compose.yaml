# DEV ONLY — for local octo-marketplace development.
#
# The credentials below are intentionally simple and must not be used in
# production. Production deployment must provide rotated secrets and managed
# persistence through the OCTO deployment repository.
services:
  marketplace-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8092:8092"
    environment:
      APP_ENV: "dev"
      MYSQL_DSN: "marketplace:marketplace@tcp(mysql:3306)/octo_marketplace?charset=utf8mb4&parseTime=true"
      API_PORT: "8092"
      PUBLIC_BASE_URL: "http://127.0.0.1:8092"
      AUTH_ENABLED: "false"
      DEV_AUTH_UID: "dev-user"
      DEV_AUTH_NAME: "Developer"
      DEV_SPACE_ID: "dev-space"
      STORAGE_DRIVER: "oss"
      OSS_ENDPOINT: "http://172.28.0.2:9000"
      OSS_BUCKET: "octo-marketplace"
      OSS_ACCESS_KEY: "octoadmin"
      OSS_SECRET_KEY: "66aac2f912bc5ec8503f54132ac18a32"
      OSS_REGION: "us-east-1"
      OSS_PATH_STYLE: "true"
      OSS_PUBLIC_ENDPOINT: "http://127.0.0.1:29000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
      - octo-net

  mysql:
    image: docker.m.daocloud.io/mysql:8.0
    environment:
      MYSQL_DATABASE: octo_marketplace
      MYSQL_USER: marketplace
      MYSQL_PASSWORD: marketplace
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysqldata:

networks:
  octo-net:
    external: true
    name: octo_octo-net
